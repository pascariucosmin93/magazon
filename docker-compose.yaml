version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: microshop-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: bitnami/kafka:3.7
    container_name: microshop-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_KRAFT_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      ALLOW_PLAINTEXT_LISTENER: "yes"
    healthcheck:
      test: ["CMD-SHELL", "/opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    environment: &common-env
      POSTGRES_HOST: 192.168.1.16
      POSTGRES_PORT: 5432
      POSTGRES_DB: microshop
      POSTGRES_USER: microshop
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8001:8000"

  product-service:
    build:
      context: .
      dockerfile: services/product-service/Dockerfile
    environment:
      <<: *common-env
      AUTH_SERVICE_URL: http://auth-service:8000
    env_file:
      - .env
    depends_on:
      auth-service:
        condition: service_started
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8002:8000"

  cart-service:
    build:
      context: .
      dockerfile: services/cart-service/Dockerfile
    environment:
      <<: *common-env
      PRODUCT_SERVICE_URL: http://product-service:8000
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      product-service:
        condition: service_started
    ports:
      - "8003:8000"

  order-service:
    build:
      context: .
      dockerfile: services/order-service/Dockerfile
    environment:
      <<: *common-env
      PRODUCT_SERVICE_URL: http://product-service:8000
    env_file:
      - .env
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8004:8000"

  inventory-service:
    build:
      context: .
      dockerfile: services/inventory-service/Dockerfile
    environment:
      <<: *common-env
    env_file:
      - .env
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8005:8000"

  payment-service:
    build:
      context: .
      dockerfile: services/payment-service/Dockerfile
    environment:
      <<: *common-env
    env_file:
      - .env
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8006:8000"

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    environment:
      <<: *common-env
    env_file:
      - .env
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8007:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      FRONTEND_API_BASE_URL: http://localhost
    depends_on:
      - auth-service
      - product-service
      - cart-service
      - order-service
    ports:
      - "8080:80"
