name: microshop-ci-cd

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  validate:
    name: Validate Python Services
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile Python code
        run: python -m compileall shared services

      - name: Lint deploy script
        run: bash -n deploy.sh

  build-images:
    name: Build and Publish Images
    runs-on: ubuntu-latest
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: auth-service
            dockerfile: services/auth-service/Dockerfile
          - name: product-service
            dockerfile: services/product-service/Dockerfile
          - name: cart-service
            dockerfile: services/cart-service/Dockerfile
          - name: order-service
            dockerfile: services/order-service/Dockerfile
          - name: inventory-service
            dockerfile: services/inventory-service/Dockerfile
          - name: payment-service
            dockerfile: services/payment-service/Dockerfile
          - name: notification-service
            dockerfile: services/notification-service/Dockerfile
          - name: frontend
            dockerfile: frontend/Dockerfile
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.name }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and optionally push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
