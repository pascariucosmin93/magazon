name: microshop-ci-cd

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}
  PYTHON_VERSION: "3.12"

jobs:
  validate:
    name: Validate, Test, and Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install test and security tooling
        run: |
          python -m pip install --upgrade pip
          pip install pytest bandit pip-audit flake8 mypy
          find services -name requirements.txt -print0 | xargs -0 -n1 pip install -r

      - name: Run pytest
        env:
          PYTHONPATH: .
          POSTGRES_PASSWORD: ci-test-password
          JWT_SECRET: ci-test-jwt-secret-minimum-32-chars-xxx
        run: pytest tests -q

      - name: Compile Python code
        run: python -m compileall shared services

      - name: Run flake8
        run: flake8 shared services --max-line-length=120 --extend-ignore=E501

      - name: Run mypy
        run: mypy shared services --ignore-missing-imports --no-strict-optional --explicit-package-bases
        continue-on-error: true

      - name: Lint deploy script
        run: bash -n deploy.sh

      - name: Run Bandit
        run: bandit -r shared services -ll

      - name: Run pip-audit
        run: |
          find services -name requirements.txt -print0 | while IFS= read -r -d '' file; do
            echo "Auditing ${file}"
            pip-audit -r "${file}"
          done

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
        continue-on-error: true

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true

      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: microshop-platform
          path: .
          format: HTML
          out: reports
          args: >
            --enableRetired
            --failOnCVSS 7

      - name: Upload OWASP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check-report
          path: reports

  determine-version:
    name: Determine Release Version
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next semantic version
        id: version
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            echo "version=pr-${{ github.event.number }}" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          git fetch --tags --force
          latest_tag="$(git tag --list '[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | head -n 1)"
          if [[ -z "${latest_tag}" ]]; then
            next_version="0.0.1"
          else
            IFS='.' read -r major minor patch <<< "${latest_tag}"
            next_version="${major}.${minor}.$((patch + 1))"
          fi
          echo "version=${next_version}" >> "${GITHUB_OUTPUT}"

      - name: Create git tag
        if: github.event_name != 'pull_request'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${VERSION}"
          git push origin "${VERSION}"

  update-helm-values:
    name: Update Helm Image Tags
    runs-on: ubuntu-latest
    needs: determine-version
    if: github.event_name != 'pull_request'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update service tags in values.yaml
        env:
          VERSION: ${{ needs.determine-version.outputs.version }}
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import os

          version = os.environ["VERSION"]
          path = Path("helm/microshop/values.yaml")
          lines = path.read_text().splitlines()
          updated = []
          for line in lines:
              if line.strip().startswith("tag: "):
                  indent = line[:len(line) - len(line.lstrip())]
                  updated.append(f"{indent}tag: {version}")
              else:
                  updated.append(line)
          path.write_text("\n".join(updated) + "\n")
          PY

      - name: Commit updated Helm tags
        env:
          VERSION: ${{ needs.determine-version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add helm/microshop/values.yaml
          git commit -m "Update Helm image tags to ${VERSION} [skip ci]" || exit 0
          git push origin HEAD:main

  build-images:
    name: Build and Publish Images
    runs-on: ubuntu-latest
    needs:
      - validate
      - determine-version
      - update-helm-values
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: auth-service
            dockerfile: services/auth-service/Dockerfile
          - name: product-service
            dockerfile: services/product-service/Dockerfile
          - name: cart-service
            dockerfile: services/cart-service/Dockerfile
          - name: order-service
            dockerfile: services/order-service/Dockerfile
          - name: inventory-service
            dockerfile: services/inventory-service/Dockerfile
          - name: payment-service
            dockerfile: services/payment-service/Dockerfile
          - name: notification-service
            dockerfile: services/notification-service/Dockerfile
          - name: frontend
            dockerfile: frontend/Dockerfile
    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.name }}
          tags: |
            type=raw,value=${{ needs.determine-version.outputs.version }},enable=${{ github.event_name != 'pull_request' }}

      - name: Build and optionally push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign image with Cosign
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.name }}
        run: |
          if [[ -z "${DIGEST}" ]]; then
            echo "Build did not produce an image digest for ${IMAGE}" >&2
            exit 1
          fi

          image_ref="${IMAGE}@${DIGEST}"
          for attempt in 1 2 3 4 5; do
            echo "Signing ${image_ref} (attempt ${attempt}/5)"
            if cosign sign --yes "${image_ref}"; then
              exit 0
            fi

            if [[ "${attempt}" -eq 5 ]]; then
              echo "Cosign signing failed after ${attempt} attempts for ${image_ref}" >&2
              exit 1
            fi

            sleep_seconds=$((attempt * 20))
            echo "Cosign signing failed; retrying in ${sleep_seconds}s..."
            sleep "${sleep_seconds}"
          done

      - name: Scan image with Trivy
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.name }}:${{ needs.determine-version.outputs.version }}
          format: sarif
          output: trivy-image-${{ matrix.name }}.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
        continue-on-error: true

      - name: Upload image scan results
        if: github.event_name != 'pull_request' && hashFiles(format('trivy-image-{0}.sarif', matrix.name)) != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image-${{ matrix.name }}.sarif
        continue-on-error: true

      - name: Generate SBOM with Syft
        if: github.event_name != 'pull_request'
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.name }}:${{ needs.determine-version.outputs.version }}
          artifact-name: sbom-${{ matrix.name }}.spdx.json
          output-file: sbom-${{ matrix.name }}.spdx.json
        continue-on-error: true
