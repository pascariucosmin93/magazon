name: post-deploy-smoke

on:
  workflow_dispatch:

jobs:
  smoke:
    name: Post-Deploy Smoke
    runs-on:
      - self-hosted
      - smoke
    if: ${{ vars.POST_DEPLOY_SMOKE_BASE_URL != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run post-deploy smoke checks
        env:
          MAGAZON_SMOKE_BASE_URL: ${{ vars.POST_DEPLOY_SMOKE_BASE_URL }}
          MAGAZON_SMOKE_ADMIN_EMAIL: ${{ vars.POST_DEPLOY_SMOKE_ADMIN_EMAIL }}
          MAGAZON_SMOKE_ADMIN_PASSWORD: ${{ secrets.POST_DEPLOY_SMOKE_ADMIN_PASSWORD }}
        run: python3 scripts/post_deploy_smoke.py
