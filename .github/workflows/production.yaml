name: microshop-production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-release
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}
  GITOPS_REPOSITORY: pascariucosmin93/magazon-gitops
  PYTHON_VERSION: "3.12"

jobs:
  validate:
    name: Validate, Test, and Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install test and security tooling
        run: |
          python -m pip install --upgrade pip
          pip install pytest bandit pip-audit flake8 mypy
          find services -name requirements.txt -print0 | xargs -0 -n1 pip install -r

      - name: Run pytest
        env:
          PYTHONPATH: .
          POSTGRES_PASSWORD: ci-test-password
          JWT_SECRET: ci-test-jwt-secret-minimum-32-chars-xxx
        run: pytest tests -q

      - name: Compile Python code
        run: python -m compileall shared services scripts

      - name: Validate frontend JavaScript
        run: |
          while IFS= read -r -d '' file; do
            node --input-type=module --check < "${file}"
          done < <(find frontend/public/assets/js -name '*.js' -print0)

      - name: Run flake8
        run: flake8 shared services scripts --max-line-length=120 --extend-ignore=E501

      - name: Run mypy
        env:
          PYTHONPATH: .
        run: |
          mypy shared --ignore-missing-imports --no-strict-optional
          for service_dir in services/*; do
            if [[ -d "${service_dir}/migrations" ]]; then
              (
                cd "${service_dir}"
                PYTHONPATH="${GITHUB_WORKSPACE}" mypy app migrate.py migrations --ignore-missing-imports --no-strict-optional
              )
            else
              (
                cd "${service_dir}"
                PYTHONPATH="${GITHUB_WORKSPACE}" mypy app --ignore-missing-imports --no-strict-optional
              )
            fi
          done

      - name: Lint deploy script
        run: bash -n deploy.sh

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint and render Helm chart
        run: |
          helm lint helm/microshop
          helm template microshop helm/microshop \
            --set secret.manage=true \
            --set secret.postgresPassword=ci-postgres-password \
            --set secret.jwtSecret=ci-test-jwt-secret-minimum-32-chars-xxx \
            --set secret.adminPassword=ci-admin-password \
            >/tmp/microshop-rendered.yaml
          test -s /tmp/microshop-rendered.yaml

      - name: Run Bandit
        run: bandit -r shared services -ll

      - name: Run pip-audit
        run: |
          audit_with_retry() {
            local file="$1"
            local attempt output status
            for attempt in 1 2 3; do
              output="$(mktemp)"
              if pip-audit -r "${file}" >"${output}" 2>&1; then
                cat "${output}"
                rm -f "${output}"
                return 0
              fi

              status=$?
              cat "${output}"
              if grep -Eq "ServiceError|503 Server Error|502 Server Error|504 Server Error|Backend is unhealthy|ReadTimeout|ConnectTimeout" "${output}" && [[ "${attempt}" -lt 3 ]]; then
                echo "Transient pip-audit service failure for ${file}; retrying in 10s (attempt ${attempt}/3)..."
                rm -f "${output}"
                sleep 10
                continue
              fi

              rm -f "${output}"
              return "${status}"
            done
          }

          find services -name requirements.txt -print0 | while IFS= read -r -d '' file; do
            echo "Auditing ${file}"
            audit_with_retry "${file}"
          done

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
        continue-on-error: true

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: trivy-results.sarif
          category: trivy-filesystem
        continue-on-error: true

  determine-version:
    name: Determine Release Version
    runs-on: ubuntu-latest
    needs: [validate, e2e]
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute next semantic version
        id: version
        run: |
          git fetch --tags --force
          latest_tag="$(git tag --list '[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | head -n 1)"
          if [[ -z "${latest_tag}" ]]; then
            next_version="0.0.1"
          else
            IFS='.' read -r major minor patch <<< "${latest_tag}"
            next_version="${major}.${minor}.$((patch + 1))"
          fi
          echo "version=${next_version}" >> "${GITHUB_OUTPUT}"

  update-gitops:
    name: Finalize GitOps Release
    runs-on: ubuntu-latest
    needs:
      - determine-version
      - build-images
    permissions:
      contents: write
    steps:
      - name: Checkout application repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Checkout GitOps repository
        uses: actions/checkout@v6
        with:
          repository: ${{ env.GITOPS_REPOSITORY }}
          path: magazon-gitops
          token: ${{ secrets.GITOPS_REPO_TOKEN }}

      - name: Update production service tags in GitOps values
        env:
          VERSION: ${{ needs.determine-version.outputs.version }}
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import os

          version = os.environ["VERSION"]
          path = Path("magazon-gitops/environments/prod/values.yaml")
          lines = path.read_text().splitlines()
          updated = []
          for line in lines:
              if line.strip().startswith("tag: "):
                  indent = line[:len(line) - len(line.lstrip())]
                  updated.append(f"{indent}tag: {version}")
              else:
                  updated.append(line)
          path.write_text("\n".join(updated) + "\n")
          PY

      - name: Update production chart revision in GitOps application
        env:
          VERSION: ${{ needs.determine-version.outputs.version }}
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import os

          version = os.environ["VERSION"]
          path = Path("magazon-gitops/applications/microshop-prod.yaml")
          lines = path.read_text().splitlines()
          updated = []
          awaiting_target_revision = False
          for line in lines:
              if line.strip() == "repoURL: https://github.com/pascariucosmin93/magazon.git":
                  awaiting_target_revision = True
                  updated.append(line)
                  continue
              if awaiting_target_revision and line.strip().startswith("targetRevision: "):
                  indent = line[:len(line) - len(line.lstrip())]
                  updated.append(f"{indent}targetRevision: {version}")
                  awaiting_target_revision = False
                  continue
              updated.append(line)
          path.write_text("\n".join(updated) + "\n")
          PY

      - name: Create application release tag
        env:
          VERSION: ${{ needs.determine-version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code --tags origin "refs/tags/${VERSION}" >/dev/null 2>&1; then
            echo "Release tag ${VERSION} already exists; skipping tag push."
          else
            git tag "${VERSION}"
            git push origin "refs/tags/${VERSION}"
          fi

      - name: Commit GitOps values
        env:
          VERSION: ${{ needs.determine-version.outputs.version }}
        run: |
          cd magazon-gitops
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add applications/microshop-prod.yaml environments/prod/values.yaml
          if git diff --cached --quiet; then
            echo "GitOps values already reference ${VERSION}; skipping commit."
          else
            git commit -m "Deploy microshop ${VERSION}"
            git push origin HEAD:main
          fi

  build-images:
    name: Build and Publish Images
    runs-on: ubuntu-latest
    needs:
      - validate
      - e2e
      - determine-version
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        include:
          - name: auth-service
            dockerfile: services/auth-service/Dockerfile
          - name: product-service
            dockerfile: services/product-service/Dockerfile
          - name: cart-service
            dockerfile: services/cart-service/Dockerfile
          - name: order-service
            dockerfile: services/order-service/Dockerfile
          - name: inventory-service
            dockerfile: services/inventory-service/Dockerfile
          - name: payment-service
            dockerfile: services/payment-service/Dockerfile
          - name: notification-service
            dockerfile: services/notification-service/Dockerfile
          - name: frontend
            dockerfile: frontend/Dockerfile
    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.name }}
          tags: |
            type=raw,value=${{ needs.determine-version.outputs.version }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          pull: true
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Sign image with Cosign
        env:
          COSIGN_IMAGE: ghcr.io/sigstore/cosign/cosign:v3.0.6
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.name }}
        run: |
          if [[ -z "${DIGEST}" ]]; then
            echo "Build did not produce an image digest for ${IMAGE}" >&2
            exit 1
          fi
          image_ref="${IMAGE}@${DIGEST}"
          for attempt in 1 2 3 4 5; do
            echo "Pulling ${COSIGN_IMAGE} (attempt ${attempt}/5)"
            if docker pull "${COSIGN_IMAGE}"; then
              break
            fi

            if [[ "${attempt}" -eq 5 ]]; then
              echo "Cosign image pull failed after ${attempt} attempts" >&2
              exit 1
            fi

            sleep_seconds=$((attempt * 20))
            echo "Cosign image pull failed; retrying in ${sleep_seconds}s..."
            sleep "${sleep_seconds}"
          done

          for attempt in 1 2 3 4 5; do
            echo "Signing ${image_ref} (attempt ${attempt}/5)"
            if docker run --rm \
              -e ACTIONS_ID_TOKEN_REQUEST_TOKEN \
              -e ACTIONS_ID_TOKEN_REQUEST_URL \
              -e CI \
              -e DOCKER_CONFIG=/cosign/.docker \
              -e GITHUB_ACTIONS \
              -v "${HOME}/.docker:/cosign/.docker:ro" \
              "${COSIGN_IMAGE}" sign --yes "${image_ref}"; then
              exit 0
            fi

            if [[ "${attempt}" -eq 5 ]]; then
              echo "Cosign signing failed after ${attempt} attempts for ${image_ref}" >&2
              exit 1
            fi

            sleep_seconds=$((attempt * 20))
            echo "Cosign signing failed; retrying in ${sleep_seconds}s..."
            sleep "${sleep_seconds}"
          done

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.name }}:${{ needs.determine-version.outputs.version }}
          format: sarif
          output: trivy-image-${{ matrix.name }}.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
        continue-on-error: true

      - name: Upload image scan results
        if: hashFiles(format('trivy-image-{0}.sarif', matrix.name)) != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image-${{ matrix.name }}.sarif
          category: trivy-image-${{ matrix.name }}
        continue-on-error: true

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.name }}:${{ needs.determine-version.outputs.version }}
          artifact-name: sbom-${{ matrix.name }}.spdx.json
          output-file: sbom-${{ matrix.name }}.spdx.json
        continue-on-error: true

  e2e:
    name: End-to-End Critical Flow
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install E2E tooling and service dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          find services -name requirements.txt -print0 | xargs -0 -n1 pip install -r

      - name: Start E2E infrastructure
        run: docker compose -f tests/e2e/docker-compose.infra.yml up -d --wait

      - name: Run E2E pytest
        env:
          PYTHONPATH: .
        run: pytest tests/e2e -q

      - name: Show E2E infrastructure logs on failure
        if: failure()
        run: docker compose -f tests/e2e/docker-compose.infra.yml logs --no-color

      - name: Stop E2E infrastructure
        if: always()
        run: docker compose -f tests/e2e/docker-compose.infra.yml down -v --remove-orphans
