apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-service
  namespace: microshop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cart-service
  template:
    metadata:
      labels:
        app: cart-service
    spec:
      containers:
        - name: cart-service
          image: microshop/cart-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: SERVICE_NAME
              value: cart-service
          envFrom:
            - configMapRef:
                name: microshop-config
            - secretRef:
                name: microshop-secret
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: cart-service
  namespace: microshop
spec:
  type: ClusterIP
  selector:
    app: cart-service
  ports:
    - name: http
      port: 8000
      targetPort: 8000
