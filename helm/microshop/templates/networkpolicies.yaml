{{- if .Values.networkPolicies.enabled }}
---
# Deny all ingress within the namespace by default.
# Each service then gets an explicit allow rule for its known callers.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: {{ include "microshop.namespace" . }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
# frontend: accepts external traffic (no podSelector restriction = allow all sources)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend-ingress
  namespace: {{ include "microshop.namespace" . }}
spec:
  podSelector:
    matchLabels:
      app: frontend
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 80
          protocol: TCP
---
# auth-service: called by frontend (reverse proxy) and product-service (admin validation)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: auth-service-ingress
  namespace: {{ include "microshop.namespace" . }}
spec:
  podSelector:
    matchLabels:
      app: auth-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: frontend
        - podSelector:
            matchLabels:
              app: product-service
      ports:
        - port: 8000
          protocol: TCP
    {{- if .Values.networkPolicies.monitoringNamespace }}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicies.monitoringNamespace }}
      ports:
        - port: 8000
          protocol: TCP
    {{- end }}
---
# product-service: called by frontend, cart-service and order-service (product lookup)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: product-service-ingress
  namespace: {{ include "microshop.namespace" . }}
spec:
  podSelector:
    matchLabels:
      app: product-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: frontend
        - podSelector:
            matchLabels:
              app: cart-service
        - podSelector:
            matchLabels:
              app: order-service
        - podSelector:
            matchLabels:
              app: chat-service
      ports:
        - port: 8000
          protocol: TCP
    {{- if .Values.networkPolicies.monitoringNamespace }}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicies.monitoringNamespace }}
      ports:
        - port: 8000
          protocol: TCP
    {{- end }}
---
# cart-service: called only by frontend
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cart-service-ingress
  namespace: {{ include "microshop.namespace" . }}
spec:
  podSelector:
    matchLabels:
      app: cart-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: frontend
      ports:
        - port: 8000
          protocol: TCP
    {{- if .Values.networkPolicies.monitoringNamespace }}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicies.monitoringNamespace }}
      ports:
        - port: 8000
          protocol: TCP
    {{- end }}
---
# order-service: called by frontend and payment-service
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: order-service-ingress
  namespace: {{ include "microshop.namespace" . }}
spec:
  podSelector:
    matchLabels:
      app: order-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: frontend
        - podSelector:
            matchLabels:
              app: payment-service
      ports:
        - port: 8000
          protocol: TCP
    {{- if .Values.networkPolicies.monitoringNamespace }}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicies.monitoringNamespace }}
      ports:
        - port: 8000
          protocol: TCP
    {{- end }}
---
# inventory-service: called by frontend for admin stock management and chat-service for public stock answers.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: inventory-service-ingress
  namespace: {{ include "microshop.namespace" . }}
spec:
  podSelector:
    matchLabels:
      app: inventory-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: frontend
        - podSelector:
            matchLabels:
              app: chat-service
      ports:
        - port: 8000
          protocol: TCP
    {{- if .Values.networkPolicies.monitoringNamespace }}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicies.monitoringNamespace }}
      ports:
        - port: 8000
          protocol: TCP
    {{- end }}
---
# payment-service: called by frontend for hosted checkout and status checks
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: payment-service-ingress
  namespace: {{ include "microshop.namespace" . }}
spec:
  podSelector:
    matchLabels:
      app: payment-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: frontend
      ports:
        - port: 8000
          protocol: TCP
    {{- if .Values.networkPolicies.monitoringNamespace }}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicies.monitoringNamespace }}
      ports:
        - port: 8000
          protocol: TCP
    {{- end }}
---
# chat-service: called by frontend and then reaches Ollama through cluster DNS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: chat-service-ingress
  namespace: {{ include "microshop.namespace" . }}
spec:
  podSelector:
    matchLabels:
      app: chat-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: frontend
      ports:
        - port: 8000
          protocol: TCP
    {{- if .Values.networkPolicies.monitoringNamespace }}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicies.monitoringNamespace }}
      ports:
        - port: 8000
          protocol: TCP
    {{- end }}
---
# notification-service: no HTTP callers — only Kafka events
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: notification-service-ingress
  namespace: {{ include "microshop.namespace" . }}
spec:
  podSelector:
    matchLabels:
      app: notification-service
  policyTypes:
    - Ingress
  ingress:
    {{- if .Values.networkPolicies.monitoringNamespace }}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicies.monitoringNamespace }}
      ports:
        - port: 8000
          protocol: TCP
    {{- end }}
---
# Redis: accept only from services that use it (product, cart, notification)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-ingress
  namespace: {{ include "microshop.namespace" . }}
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: product-service
        - podSelector:
            matchLabels:
              app: cart-service
        - podSelector:
            matchLabels:
              app: notification-service
      ports:
        - port: 6379
          protocol: TCP
{{- end }}
