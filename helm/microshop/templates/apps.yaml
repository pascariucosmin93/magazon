{{- range $name, $svc := .Values.services }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $name }}
  namespace: {{ include "microshop.namespace" $ }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ include "microshop.namespace" $ }}
spec:
  replicas: {{ $svc.replicas }}
  selector:
    matchLabels:
      app: {{ $name }}
  template:
    metadata:
      labels:
        app: {{ $name }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: {{ $svc.containerPort | quote }}
    spec:
      serviceAccountName: {{ $name }}
      securityContext:
        runAsNonRoot: true
        runAsUser: {{ default 1000 $svc.runAsUser }}
        fsGroup: {{ default 1000 $svc.runAsUser }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: {{ $name }}
                topologyKey: kubernetes.io/hostname
      containers:
        - name: {{ $name }}
          image: "{{ $svc.repository }}:{{ $svc.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: {{ $svc.containerPort }}
          resources:
            {{- toYaml $svc.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          {{- if ne $name "frontend" }}
          env:
            - name: SERVICE_NAME
              value: {{ $name | quote }}
            {{- if eq $name "cart-service" }}
            - name: PRODUCT_SERVICE_URL
              value: "http://product-service:8000"
            {{- end }}
            {{- if eq $name "product-service" }}
            - name: AUTH_SERVICE_URL
              value: "http://auth-service:8000"
            {{- end }}
            {{- if eq $name "order-service" }}
            - name: PRODUCT_SERVICE_URL
              value: "http://product-service:8000"
            {{- end }}
            {{- if eq $name "payment-service" }}
            - name: ORDER_SERVICE_URL
              value: "http://order-service:8000"
            {{- end }}
            {{- include "microshop.databaseEnv" (dict "service" $svc) | nindent 12 }}
          envFrom:
            - configMapRef:
                name: microshop-config
            - secretRef:
                name: microshop-secret
          startupProbe:
            httpGet:
              path: /health
              port: {{ $svc.containerPort }}
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /ready
              port: {{ $svc.containerPort }}
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: {{ $svc.containerPort }}
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          {{- else }}
          startupProbe:
            httpGet:
              path: /
              port: {{ $svc.containerPort }}
            failureThreshold: 10
            periodSeconds: 3
          readinessProbe:
            httpGet:
              path: /
              port: {{ $svc.containerPort }}
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: {{ $svc.containerPort }}
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 5
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ include "microshop.namespace" $ }}
  {{- if and (eq $name "frontend") ($svc.loadBalancerIP) }}
  annotations:
    lbipam.cilium.io/ips: {{ $svc.loadBalancerIP | quote }}
  {{- end }}
spec:
  type: {{ $svc.serviceType }}
  {{- if and (hasKey $svc "externalTrafficPolicy") (or (eq $svc.serviceType "LoadBalancer") (eq $svc.serviceType "NodePort")) }}
  externalTrafficPolicy: {{ $svc.externalTrafficPolicy }}
  {{- end }}
  selector:
    app: {{ $name }}
  ports:
    - port: {{ $svc.servicePort }}
      targetPort: {{ $svc.containerPort }}
      {{- if hasKey $svc "nodePort" }}
      nodePort: {{ $svc.nodePort }}
      {{- end }}
---
{{- if ne (default true $svc.autoscaling.enabled) false }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ $name }}
  namespace: {{ include "microshop.namespace" $ }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ $name }}
  minReplicas: {{ default (int $svc.replicas) $svc.autoscaling.minReplicas }}
  maxReplicas: {{ default (max 2 (int $svc.replicas)) $svc.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ default 85 $svc.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
{{- if gt (int $svc.replicas) 1 }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ $name }}
  namespace: {{ include "microshop.namespace" $ }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: {{ $name }}
{{- end }}
{{- end }}
