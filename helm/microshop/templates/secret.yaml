{{- if .Values.secret.manage }}
{{- if not .Values.secret.postgresPassword }}
  {{- fail "secret.postgresPassword must be set when secret.manage=true" }}
{{- end }}
{{- if not .Values.secret.jwtSecret }}
  {{- fail "secret.jwtSecret must be set when secret.manage=true" }}
{{- end }}
{{- if not .Values.secret.adminPassword }}
  {{- fail "secret.adminPassword must be set when secret.manage=true" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: microshop-secret
  namespace: {{ include "microshop.namespace" . }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ .Values.secret.postgresPassword | quote }}
  AUTH_POSTGRES_PASSWORD: {{ default .Values.secret.postgresPassword .Values.secret.authPostgresPassword | quote }}
  PRODUCT_POSTGRES_PASSWORD: {{ default .Values.secret.postgresPassword .Values.secret.productPostgresPassword | quote }}
  ORDER_POSTGRES_PASSWORD: {{ default .Values.secret.postgresPassword .Values.secret.orderPostgresPassword | quote }}
  INVENTORY_POSTGRES_PASSWORD: {{ default .Values.secret.postgresPassword .Values.secret.inventoryPostgresPassword | quote }}
  PAYMENT_POSTGRES_PASSWORD: {{ default .Values.secret.postgresPassword .Values.secret.paymentPostgresPassword | quote }}
  ADMIN_PASSWORD: {{ .Values.secret.adminPassword | quote }}
  JWT_SECRET: {{ .Values.secret.jwtSecret | quote }}
  STRIPE_SECRET_KEY: {{ .Values.secret.stripeSecretKey | quote }}
{{- end }}
{{- /*
  When secret.manage=false (default, used with ArgoCD), the Secret must be
  pre-created in the namespace before syncing. Example:

  kubectl create secret generic microshop-secret \
    --namespace microshop \
    --from-literal=POSTGRES_PASSWORD='<value>' \
    --from-literal=AUTH_POSTGRES_PASSWORD='<value>' \
    --from-literal=PRODUCT_POSTGRES_PASSWORD='<value>' \
    --from-literal=ORDER_POSTGRES_PASSWORD='<value>' \
    --from-literal=INVENTORY_POSTGRES_PASSWORD='<value>' \
    --from-literal=PAYMENT_POSTGRES_PASSWORD='<value>' \
    --from-literal=ADMIN_PASSWORD='<value>' \
    --from-literal=JWT_SECRET='<value>' \
    --from-literal=STRIPE_SECRET_KEY='sk_live_<value>'

  For automated secret injection use External Secrets Operator or Sealed Secrets.
*/}}
