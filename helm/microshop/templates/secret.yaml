apiVersion: v1
kind: Secret
metadata:
  name: microshop-secret
  namespace: {{ include "microshop.namespace" . }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ required "secret.postgresPassword must be set (--set secret.postgresPassword=<value>)" .Values.secret.postgresPassword | quote }}
  JWT_SECRET: {{ required "secret.jwtSecret must be set (--set secret.jwtSecret=<value>)" .Values.secret.jwtSecret | quote }}
