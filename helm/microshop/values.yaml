namespaceOverride: microshop
createNamespace: false

config:
  POSTGRES_HOST: 192.168.1.16
  POSTGRES_PORT: "5432"
  POSTGRES_DB: microshop
  POSTGRES_USER: microshop
  REDIS_URL: redis://redis:6379/0
  KAFKA_BOOTSTRAP_SERVERS: kafka.kafka.svc.cluster.local:9092

# Secret values must be supplied at deploy time — never commit real values here.
# Example: helm upgrade --install microshop ./helm/microshop \
#   --set secret.postgresPassword=<password> \
#   --set secret.jwtSecret=<secret>
secret:
  postgresPassword: ""
  jwtSecret: ""

redis:
  image: redis:7-alpine

networkPolicies:
  enabled: true
  # Set to the namespace where Prometheus is deployed to allow scraping.
  # Leave empty to skip the monitoring allow rule.
  monitoringNamespace: monitoring

services:
  auth-service:
    repository: ghcr.io/pascariucosmin93/magazon/auth-service
    tag: 0.0.9
    containerPort: 8000
    servicePort: 8000
    serviceType: ClusterIP
    replicas: 1
    runMigrations: true
  product-service:
    repository: ghcr.io/pascariucosmin93/magazon/product-service
    tag: 0.0.9
    containerPort: 8000
    servicePort: 8000
    serviceType: ClusterIP
    replicas: 1
    runMigrations: true
  cart-service:
    repository: ghcr.io/pascariucosmin93/magazon/cart-service
    tag: 0.0.9
    containerPort: 8000
    servicePort: 8000
    serviceType: ClusterIP
    replicas: 1
  order-service:
    repository: ghcr.io/pascariucosmin93/magazon/order-service
    tag: 0.0.9
    containerPort: 8000
    servicePort: 8000
    serviceType: ClusterIP
    replicas: 1
    runMigrations: true
  inventory-service:
    repository: ghcr.io/pascariucosmin93/magazon/inventory-service
    tag: 0.0.9
    containerPort: 8000
    servicePort: 8000
    serviceType: ClusterIP
    replicas: 1
    runMigrations: true
  payment-service:
    repository: ghcr.io/pascariucosmin93/magazon/payment-service
    tag: 0.0.9
    containerPort: 8000
    servicePort: 8000
    serviceType: ClusterIP
    replicas: 1
  notification-service:
    repository: ghcr.io/pascariucosmin93/magazon/notification-service
    tag: 0.0.9
    containerPort: 8000
    servicePort: 8000
    serviceType: ClusterIP
    replicas: 1
  frontend:
    repository: ghcr.io/pascariucosmin93/magazon/frontend
    tag: 0.0.9
    loadBalancerIP: 10.10.2.50
    containerPort: 80
    servicePort: 80
    serviceType: LoadBalancer
    replicas: 1
