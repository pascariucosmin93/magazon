namespaceOverride: microshop
createNamespace: false

config:
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_DB: microshop
  POSTGRES_USER: microshop
  REDIS_URL: redis://redis:6379/0
  KAFKA_BOOTSTRAP_SERVERS: kafka:9092

secret:
  POSTGRES_PASSWORD: microshop
  JWT_SECRET: supersecret

postgres:
  image: postgres:16-alpine
  storage: 2Gi

redis:
  image: redis:7-alpine

kafka:
  image: bitnami/kafka:3.7
  clusterId: MkU3OEVBNTcwNTJENDM2Qk

services:
  auth-service:
    image: microshop/auth-service:latest
    containerPort: 8000
    servicePort: 8000
    serviceType: ClusterIP
    replicas: 1
  product-service:
    image: microshop/product-service:latest
    containerPort: 8000
    servicePort: 8000
    serviceType: ClusterIP
    replicas: 1
  cart-service:
    image: microshop/cart-service:latest
    containerPort: 8000
    servicePort: 8000
    serviceType: ClusterIP
    replicas: 1
  order-service:
    image: microshop/order-service:latest
    containerPort: 8000
    servicePort: 8000
    serviceType: ClusterIP
    replicas: 1
  inventory-service:
    image: microshop/inventory-service:latest
    containerPort: 8000
    servicePort: 8000
    serviceType: ClusterIP
    replicas: 1
  payment-service:
    image: microshop/payment-service:latest
    containerPort: 8000
    servicePort: 8000
    serviceType: ClusterIP
    replicas: 1
  notification-service:
    image: microshop/notification-service:latest
    containerPort: 8000
    servicePort: 8000
    serviceType: ClusterIP
    replicas: 1
  frontend:
    image: microshop/frontend:latest
    containerPort: 80
    servicePort: 80
    serviceType: NodePort
    nodePort: 30080
    replicas: 1
