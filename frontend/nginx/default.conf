server {
  listen 80;
  server_name _;

  add_header Content-Security-Policy "object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;

  root /usr/share/nginx/html;
  index index.html;

  proxy_http_version 1.1;
  proxy_connect_timeout 5s;
  proxy_send_timeout 30s;
  proxy_read_timeout 30s;
  proxy_set_header Host $host;
  proxy_set_header X-Forwarded-Host $host;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Request-Id $request_id;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /api/auth/ {
    proxy_pass http://auth-service:8000/;
  }

  location /api/products/ {
    proxy_pass http://product-service:8000/;
  }

  location /api/cart/ {
    proxy_pass http://cart-service:8000/;
  }

  location /api/orders/ {
    proxy_pass http://order-service:8000/;
  }

  location /api/inventory/ {
    proxy_pass http://inventory-service:8000/;
  }

  location /api/payments/ {
    proxy_pass http://payment-service:8000/;
  }

  location /api/chat/ {
    proxy_pass http://chat-service:8000/;
  }
}
