<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Microshop Platform</title>
    <style>
      :root {
        --bg: #f6f1e8;
        --panel: rgba(255, 255, 255, 0.92);
        --text: #102a43;
        --muted: #486581;
        --primary: #c44900;
        --primary-dark: #8a2b06;
        --line: #d9e2ec;
        --accent: #2d6a4f;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(196, 73, 0, 0.12), transparent 30%),
          radial-gradient(circle at bottom right, rgba(45, 106, 79, 0.12), transparent 35%),
          var(--bg);
      }
      .wrap {
        max-width: 1120px;
        margin: 0 auto;
        padding: 32px 20px 60px;
      }
      .hero {
        display: grid;
        grid-template-columns: 1.2fr 0.8fr;
        gap: 20px;
        margin-bottom: 24px;
      }
      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 20px;
        box-shadow: 0 18px 40px rgba(16, 42, 67, 0.08);
      }
      h1, h2 { margin-top: 0; }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 16px;
      }
      .product-card {
        padding: 18px;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: #fff;
      }
      button {
        border: 0;
        border-radius: 10px;
        padding: 10px 14px;
        background: var(--primary);
        color: white;
        cursor: pointer;
      }
      button:hover { background: var(--primary-dark); }
      input {
        width: 100%;
        margin-bottom: 10px;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid var(--line);
      }
      .stack > * + * { margin-top: 12px; }
      .muted { color: var(--muted); }
      pre {
        background: #0f172a;
        color: #f8fafc;
        padding: 12px;
        border-radius: 10px;
        overflow: auto;
      }
      @media (max-width: 860px) {
        .hero { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <section class="hero">
        <div class="panel">
          <h1>Microshop Platform</h1>
          <p class="muted">
            Demo frontend for the microservice e-commerce flow: auth, products,
            cart, orders, inventory, payment and notifications.
          </p>
          <div class="stack">
            <div>
              <input id="email" value="demo@microshop.local" placeholder="email" />
              <input id="password" value="demo123" placeholder="password" type="password" />
              <button onclick="register()">Register</button>
              <button onclick="login()">Login</button>
            </div>
            <div>
              <strong>User:</strong> <span id="user-state">not authenticated</span>
            </div>
          </div>
        </div>
        <div class="panel">
          <h2>Order Actions</h2>
          <p class="muted">Use the seeded products below, add to cart, then place an order.</p>
          <div class="stack">
            <button onclick="loadCart()">Refresh Cart</button>
            <button onclick="placeOrder()">Place Order</button>
            <button onclick="loadOrder()">Last Order Status</button>
            <pre id="order-output">No order yet.</pre>
          </div>
        </div>
      </section>

      <section class="panel" style="margin-bottom: 24px;">
        <h2>Products</h2>
        <div class="grid" id="products"></div>
      </section>

      <section class="panel">
        <h2>Cart</h2>
        <pre id="cart-output">Cart is empty.</pre>
      </section>
    </div>

    <script>
      const endpoints = {
        auth: "/api/auth",
        products: "/api/products",
        cart: "/api/cart",
        orders: "/api/orders"
      };

      let state = {
        userId: null,
        token: null,
        lastOrderId: null,
        products: []
      };

      async function request(url, options = {}) {
        const response = await fetch(url, {
          headers: { "Content-Type": "application/json", ...(options.headers || {}) },
          ...options
        });
        if (!response.ok) {
          const error = await response.text();
          throw new Error(error);
        }
        return response.json();
      }

      async function register() {
        try {
          const body = {
            email: document.getElementById("email").value,
            password: document.getElementById("password").value
          };
          const result = await request(`${endpoints.auth}/register`, {
            method: "POST",
            body: JSON.stringify(body)
          });
          state.userId = result.id;
          document.getElementById("user-state").innerText = `registered user ${result.email} (#${result.id})`;
        } catch (error) {
          alert(`Register failed: ${error.message}`);
        }
      }

      async function login() {
        try {
          const body = {
            email: document.getElementById("email").value,
            password: document.getElementById("password").value
          };
          const result = await request(`${endpoints.auth}/login`, {
            method: "POST",
            body: JSON.stringify(body)
          });
          state.userId = result.user_id;
          state.token = result.token;
          document.getElementById("user-state").innerText = `logged in as ${result.email} (#${result.user_id})`;
          await loadCart();
        } catch (error) {
          alert(`Login failed: ${error.message}`);
        }
      }

      async function loadProducts() {
        const result = await request(`${endpoints.products}/products`);
        state.products = result.items;
        const root = document.getElementById("products");
        root.innerHTML = "";
        result.items.forEach((product) => {
          const node = document.createElement("div");
          node.className = "product-card";
          node.innerHTML = `
            <h3>${product.name}</h3>
            <p>${product.description}</p>
            <p><strong>${product.price} EUR</strong></p>
            <button>Add to cart</button>
          `;
          node.querySelector("button").onclick = () => addToCart(product.id);
          root.appendChild(node);
        });
      }

      async function addToCart(productId) {
        if (!state.userId) {
          alert("Register or login first.");
          return;
        }
        await request(`${endpoints.cart}/cart/add`, {
          method: "POST",
          body: JSON.stringify({
            user_id: state.userId,
            product_id: productId,
            quantity: 1
          })
        });
        await loadCart();
      }

      async function loadCart() {
        if (!state.userId) {
          return;
        }
        const result = await request(`${endpoints.cart}/cart/${state.userId}`);
        document.getElementById("cart-output").innerText = JSON.stringify(result, null, 2);
        return result;
      }

      async function placeOrder() {
        if (!state.userId) {
          alert("Login first.");
          return;
        }
        const cart = await loadCart();
        if (!cart.items.length) {
          alert("Cart is empty.");
          return;
        }
        const items = cart.items.map((item) => {
          const product = state.products.find((candidate) => candidate.id === item.product_id);
          return {
            product_id: item.product_id,
            quantity: item.quantity,
            price: product ? product.price : 0
          };
        });
        const result = await request(`${endpoints.orders}/orders`, {
          method: "POST",
          body: JSON.stringify({ user_id: state.userId, items })
        });
        state.lastOrderId = result.order_id;
        document.getElementById("order-output").innerText = JSON.stringify(result, null, 2);
      }

      async function loadOrder() {
        if (!state.lastOrderId) {
          return;
        }
        const result = await request(`${endpoints.orders}/orders/${state.lastOrderId}`);
        document.getElementById("order-output").innerText = JSON.stringify(result, null, 2);
      }

      loadProducts();
    </script>
  </body>
</html>
